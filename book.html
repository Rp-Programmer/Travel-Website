<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(39,39,39);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        nav{
            background-color: rgb(32, 32, 32);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        nav h1{
            font-size: 3rem;
            position: relative;
        }
        nav h1::after{
            content: 'a';
            color: orange;
        }
        nav ul{
            list-style: none;
            display: flex;
            flex-direction: row;
            gap:20px;
        }
        nav ul li a:not(.bookbtn){
            text-decoration: none;
            color: white;
            background-color: transparent;
            position: relative;
            padding-bottom: 4px;
        }
        nav ul li a.bookbtn{
            text-decoration: none;
            color: white;
            background-color: orange;
            padding: 10px 20px;
            border-radius: 50px;
        }
        nav ul li a::after{
            content: '';
            position: absolute;
            bottom: 0;
            left:50%;
            width:0;
            height: 3px;
            background-color: orange;
            transition: all 0.3s ease;
        }
        nav ul li a:hover::after{
            width:100%;
            left:0;
        }
        nav ul li a.bookbtn:hover{
            background-color: rgb(145, 98, 12);
            color: black;
        }
        .con{
            background-color: rgb(32, 32, 32);
            padding: 60px 40px 20px;
        }
        .con .form{
            background-color: rgb(75, 70, 70);
            border-radius: 16px;
        }
        .con .form form{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:10px;
        }
        .con .form form input,select{
            width:100%;
            height: 30px;
            background-color: rgb(129, 118, 118);
            outline: none;
            border: none;
            border-radius: 16px;
        }
        .focus:focus-within label{
            color: orange;
        }
        footer{
            background-color: rgb(32, 32, 32);
            padding:40px 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
         <h1>Travel</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#about">About Us</a></li>
            <li><a href="#ser">Services</a></li>
            <li><a href="packages.html">Packages</a></li>
            <li><a href="#" class="bookbtn">Book Now</a></li>
        </ul>
    </nav>
    <div class="con">
        <div class="form">
            <form>
                <div class="focus">
                    <label for="name">Name:</label>
                    <input type="text" id="name">
                </div>
                <div class="focus">
                    <label for="email">Email:</label>
                    <input type="email" id="email">
                </div>
                <div class="focus">
                    <label for="date">Date of Travelling:</label>
                    <input type="date" id="date">
                </div>
                <div class="focus">
                    <label for="sel">Choose Your Destination:</label>
                    <select name="" id="sel">
                        <option value="">Kerala</option>
                        <option value="">Manali</option>
                        <option value="">Darjeeling</option>
                    </select>
                </div>
                <input type="submit">
            </form>
        </div>
    </div>
     <footer>
        <p>&copy;Reserved Rights.Built For Travela Company.</p>
    </footer>
    
</body>
</html>
